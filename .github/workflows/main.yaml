name: Main
on:
  push:
    branches:
      - master

    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  security_audit:
    name: security_audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-audit from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-audit
          version: "0.22.0"
      - run: cargo audit --ignore RUSTSEC-2022-0093 --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2024-0421 --ignore RUSTSEC-2025-0022 --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0004 --ignore RUSTSEC-2024-0357 --ignore RUSTSEC-2024-0336 --ignore RUSTSEC-2025-0055

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libudev-dev libclang-dev
      - name: Install cargo-sort from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-sort
          version: 2.0.1
      - run: cargo sort --workspace --check
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --tests -- -D warnings

  # udeps:
  #   name: udeps
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         submodules: recursive
  #     - name: Install Protobuf Compiler
  #       run: |
  #         sudo apt-get update
  #         sudo apt-get install -y protobuf-compiler libudev-dev libclang-dev
  #     - uses: actions-rust-lang/setup-rust-toolchain@v1
  #       with:
  #         toolchain: nightly-2025-02-19
  #     - name: Install cargo-udeps from crates.io
  #       uses: baptiste0928/cargo-install@v3
  #       with:
  #         crate: cargo-udeps
  #         version: "0.1.57"
  #     - run: cargo +nightly-2025-02-19 udeps --all-features --all-targets --tests

  build_release:
    name: build_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libudev-dev libclang-dev
      - name: Build release
        run: cargo build --release

  verified_build:
    name: verified_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af

      - name: Install solana-verify deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libudev-dev libclang-dev

      - name: Install solana-verify from git
        run: cargo install solana-verify --git https://github.com/Ellipsis-Labs/solana-verifiable-build.git

      # Install Agave CLI
      - name: install solana toolsuite
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v3.0.8/install)"

      - name: add to path
        run: echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # run verified build
      - run: git checkout $(git rev-parse --abbrev-ref HEAD) -- Cargo.lock

      - name: Run verified build
        run: solana-verify build --library-name jito_whitelist_management_program
        env:
          SVB_DOCKER_MEMORY_LIMIT: 6g
          SVB_DOCKER_CPU_LIMIT: 2

      # upload the IDL and verified build
      - name: Upload jito_whitelist_management_program.so
        uses: actions/upload-artifact@v4
        with:
          name: jito_whitelist_management_program.so
          path: target/deploy/jito_whitelist_management_program.so

  # tests run on verified build
  test:
    name: test
    runs-on: ubuntu-latest

    needs:
      - verified_build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libudev-dev libclang-dev

      - uses: actions/download-artifact@v4
        with:
          name: jito_whitelist_management_program.so
          path: target/sbf-solana-solana/release/

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: cargo nextest run
        env:
          SBF_OUT_DIR: ${{ github.workspace }}/target/sbf-solana-solana/release
